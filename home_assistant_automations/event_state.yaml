# Smartchime Doorbell & Motion Event Automations
#
# Publishes doorbell and motion events to MQTT for Smartchime to handle
# (chime playback, AMOLED video display).
#
# OLED display updates are handled separately by the v2 OLED state contract
# (see oled_state.yaml) which already triggers on the same entities.
#
# Replace placeholder entities with your own:
#   - binary_sensor.front_door_doorbell_visitor  (doorbell ring)
#   - binary_sensor.front_door_person_occupancy  (motion detection)
#   - camera.front_door                          (camera for RTSP/clip URL)

script:
  smartchime_publish_doorbell_event:
    alias: "[Smartchime] Publish Doorbell Event"
    description: >-
      Publish a doorbell event to MQTT. Called by automations when
      the doorbell rings or clears.
    mode: queued
    max: 5
    fields:
      active:
        description: "Whether the doorbell is currently ringing"
        required: true
        selector:
          boolean:
    sequence:
      - action: mqtt.publish
        data:
          topic: smartchime/events/doorbell
          qos: "1"
          payload: >-
            {
              "active": {{ active | tojson }},
              "timestamp": "{{ now().isoformat() }}"
              {% if active and state_attr('camera.front_door', 'stream_source') is not none %}
              , "video_url": "{{ state_attr('camera.front_door', 'stream_source') }}"
              {% endif %}
            }

  smartchime_publish_motion_event:
    alias: "[Smartchime] Publish Motion Event"
    description: >-
      Publish a motion event to MQTT. Called by automations when
      motion is detected or clears.
    mode: queued
    max: 5
    fields:
      active:
        description: "Whether motion is currently detected"
        required: true
        selector:
          boolean:
    sequence:
      - action: mqtt.publish
        data:
          topic: smartchime/events/motion
          qos: "1"
          payload: >-
            {
              "active": {{ active | tojson }},
              "timestamp": "{{ now().isoformat() }}"
              {% if active and state_attr('camera.front_door', 'stream_source') is not none %}
              , "video_url": "{{ state_attr('camera.front_door', 'stream_source') }}"
              {% endif %}
            }

automation:
  - alias: "[Smartchime] Doorbell Ring Detected"
    description: "Publish doorbell active event when doorbell rings"
    triggers:
      - entity_id: binary_sensor.front_door_doorbell_visitor
        to: "on"
        trigger: state
    conditions: []
    actions:
      - action: script.smartchime_publish_doorbell_event
        data:
          active: true
    mode: single

  - alias: "[Smartchime] Doorbell Ring Cleared"
    description: "Publish doorbell inactive event when doorbell clears"
    triggers:
      - entity_id: binary_sensor.front_door_doorbell_visitor
        to: "off"
        trigger: state
    conditions: []
    actions:
      - action: script.smartchime_publish_doorbell_event
        data:
          active: false
    mode: single

  - alias: "[Smartchime] Motion Detected"
    description: "Publish motion active event when person detected"
    triggers:
      - entity_id: binary_sensor.front_door_person_occupancy
        to: "on"
        trigger: state
    conditions: []
    actions:
      - action: script.smartchime_publish_motion_event
        data:
          active: true
    mode: single

  - alias: "[Smartchime] Motion Cleared"
    description: "Publish motion inactive event when person clears"
    triggers:
      - entity_id: binary_sensor.front_door_person_occupancy
        to: "off"
        trigger: state
    conditions: []
    actions:
      - action: script.smartchime_publish_motion_event
        data:
          active: false
    mode: single
